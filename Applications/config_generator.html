<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Databricks Config Generator</title>

<style>
body{
    font-family:Arial,Helvetica,sans-serif;
    background:#f2f4f8;
    margin:40px;
}

.container{
    max-width:1000px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,.15);
}

h1{
    color:#3527F5;
    margin-top:0;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    margin-top:15px;
    margin-right:10px;
    padding:10px 20px;
    font-size:16px;
    cursor:pointer;
}

textarea{
    width:100%;
    height:520px;
    margin-top:20px;
    font-family:Consolas,Courier New,monospace;
    font-size:14px;
    white-space:pre;
}
</style>

</head>
<body>

<div class="container">

<h1>Databricks JSON Config Generator</h1>

<label>Exam Title</label>

<input
    id="examTitle"
    type="text"
    value="03 Databricks High Level Architecture">
	
<label>Folder Paths</label>

<input
    id="folderPaths"
    type="text"
    value="03_Databricks_High_Level_Architecture">	

<button onclick="generateConfig()">
Generate Config
</button>

<button onclick="copyOutput()">
Copy
</button>

<textarea id="output"></textarea>

</div>

<script>

function generateConfig(){

    const title =
        document.getElementById("examTitle").value.trim();
		
	const folder = 
		document.getElementById("folderPaths").value.trim();

    // Example:
    // 03 Databricks High Level Architecture
    // ->
    // 03_Databricks_High_Level_Architecture

    // Extract chapter number

    const match =
        title.match(/^(\d+)/);

    const chapter =
        match ? match[1] : "00";

    const json =
`{
  "config": {
    "version": "1.0",
    "exam_name": "<div style=\\"color: #3527F5; font-weight: bold; padding: 10px;\\">${title}</div>",
    "link_explanation_base_url": "https://github.com/progressivepull/Databricks-Ease_With_Data/tree/main/markdown_explains/${folder}",
    "link_explanation_folder_name": "EXPLANATION_${chapter}_*",
    "link_explanation_file_name": "EXPLANATION_${chapter}_*",
    "link_answer_base_url": "https://github.com/progressivepull/Databricks-Ease_With_Data/blob/main/markdown_answers/${folder}",
    "link_answer_folder_name": "ANSWER_${chapter}_*",
    "link_answer_file_name": "ANSWER_${chapter}_*",
    "link_terms": "https://github.com/progressivepull/Databricks-Ease_With_Data/blob/main/markdown_terms/terms",
    "readme_content": "https://github.com/progressivepull/Databricks-Ease_With_Data/blob/main/README",
    "shuffle_questions": true,
    "shuffle_options": true,
    "time_limit_minutes": 60
  },
`;

    document.getElementById("output").value = json;

}

function copyOutput(){

    const textarea =
        document.getElementById("output");

    textarea.select();

    navigator.clipboard.writeText(textarea.value);

    alert("Copied!");
}

generateConfig();

</script>

</body>
</html>
